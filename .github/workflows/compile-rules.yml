name: Convert YAML to MRS
on:
  push:
    paths:
      - 'rules/**.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          # 下载并安装内核
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-compatible-v1.19.20.gz | gunzip > mihomo
          chmod +x mihomo

      - name: Auto-Fix Format and Convert to MRS
        run: |
          # 遍历 rules 目录下所有的 yaml 文件
          find rules/ -name "*.yaml" | while read file; do
            if [ -f "$file" ]; then
              filename="${file%.*}"
              echo "====================================="
              echo "🔧 正在处理: $file"
              
              # 【核心修复 1】: 强制修复缩进！把所有顶格的 "- " 替换为 "  - " (前面加两个空格)
              # 这样就完美符合了 YAML 的严格缩进规范，杜绝空指针崩溃
              sed -i 's/^- /  - /g' "$file"
              
              # 【核心修复 2】: 如果文件第一行不是 payload:，自动在最前面补上
              if ! grep -q "^payload:" "$file"; then
                sed -i '1s/^/payload:\n/' "$file"
              fi
              
              echo "✅ 修复后的格式预览 (前3行):"
              head -n 3 "$file"
              
              # 喂给内核进行转换
              ./mihomo convert-ruleset classical yaml "$file" "${filename}.mrs"
              echo "🎉 $file 转换成功！"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rules/*.mrs
          
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Auto-fix YAML indentation and convert to MRS"
            git push
          fi
