name: Convert rules to MRS

on:
  push:
    paths:
      - 'rules/**/*.yaml'
      - 'rules/**/*.yml'
      - 'rules/**/*.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        env:
          MIHOMO_VERSION: v1.18.10
        run: |
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          ./mihomo -v || true

      - name: Collect changed rule files
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ['GITHUB_EVENT_NAME']
          before = os.environ.get('GITHUB_EVENT_BEFORE', '')
          current = os.environ['GITHUB_SHA']
          exts = {'.yaml', '.yml', '.txt'}
          changes = []

          def is_rule_file(path: str) -> bool:
              p = Path(path)
              return p.parts and p.parts[0] == 'rules' and p.suffix.lower() in exts

          if event_name == 'workflow_dispatch' or not before or set(before) == {'0'}:
              for path in sorted(Path('rules').rglob('*')):
                  if path.is_file() and path.suffix.lower() in exts:
                      changes.append({'status': 'A', 'path': path.as_posix()})
          else:
              result = subprocess.run(
                  ['git', 'diff', '--name-status', before, current],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              for line in result.stdout.splitlines():
                  if not line.strip():
                      continue
                  parts = line.split('\t')
                  status = parts[0]
                  if status.startswith('R') and len(parts) >= 3:
                      old_path, new_path = parts[1], parts[2]
                      if is_rule_file(old_path):
                          changes.append({'status': 'D', 'path': old_path})
                      if is_rule_file(new_path):
                          changes.append({'status': 'A', 'path': new_path})
                  elif len(parts) >= 2:
                      path = parts[1]
                      if is_rule_file(path):
                          changes.append({'status': status[0], 'path': path})

          Path('changed_rules.json').write_text(json.dumps(changes, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(changes, ensure_ascii=False, indent=2))
          PY
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Convert changed rules
        run: |
          cat <<'EOF' > convert_txt_rules.py
          import sys
          from pathlib import Path

          def normalize_rule(item: str) -> str | None:
              item = item.strip().replace('\xa0', ' ')
              if not item or item.startswith('#'):
                  return None
              if item.startswith('- '):
                  item = item[2:].strip()
              if item.startswith('+.'):
                  item = 'DOMAIN-SUFFIX,' + item[2:]
              elif ',' not in item and item != 'MATCH':
                  item = 'DOMAIN,' + item
              return item or None

          input_path = Path(sys.argv[1])
          output_path = Path(sys.argv[2])
          content = input_path.read_text(encoding='utf-8').replace('\r', '')
          rules = []
          for line in content.split('\n'):
              normalized = normalize_rule(line)
              if normalized:
                  rules.append(normalized)

          if not rules:
              raise SystemExit(0)

          output_path.write_text(
              'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
              encoding='utf-8'
          )
          EOF

          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          import yaml

          changes = json.loads(Path('changed_rules.json').read_text(encoding='utf-8'))

          def build_yaml_payload(path: Path, rules: list[str], suffix: str) -> Path:
              tmp_yaml = path.with_suffix(suffix)
              tmp_yaml.write_text(
                  'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
                  encoding='utf-8'
              )
              return tmp_yaml

          def filter_yaml_rules(path: Path) -> Path:
              data = yaml.safe_load(path.read_text(encoding='utf-8'))
              payload = data.get('payload') if isinstance(data, dict) else None
              if not isinstance(payload, list):
                  raise ValueError(f'Invalid payload in {path.as_posix()}')

              valid_rules = []
              skipped_rules = []

              for idx, rule in enumerate(payload, start=1):
                  if not isinstance(rule, str):
                      skipped_rules.append((idx, repr(rule), 'non-string rule'))
                      continue

                  if rule.startswith('PROCESS-NAME,'):
                      skipped_rules.append((idx, rule, 'unsupported PROCESS-NAME rule'))
                      continue

                  valid_rules.append(rule)

              if skipped_rules:
                  skipped_rules.sort(key=lambda item: item[0])
                  print(f'Skipped {len(skipped_rules)} unsupported rules in {path.as_posix()}:')
                  for idx, rule, reason in skipped_rules:
                      print(f'  line #{idx}: {rule} -- {reason}')

              if not valid_rules:
                  print(f'No valid YAML rules remain: {path.as_posix()}')
                  return path

              if len(valid_rules) == len(payload):
                  return path

              return build_yaml_payload(path, valid_rules, '.sanitized.yaml')

          for change in changes:
              path = Path(change['path'])
              mrs_path = path.with_suffix('.mrs')
              status = change['status']
              suffix = path.suffix.lower()

              if status == 'D':
                  if mrs_path.exists():
                      mrs_path.unlink()
                      print(f'Removed: {mrs_path.as_posix()}')
                  continue

              if not path.exists():
                  print(f'Skip missing source: {path.as_posix()}')
                  continue

              try:
                  if suffix in ('.yaml', '.yml'):
                      sanitized_yaml = filter_yaml_rules(path)
                      try:
                          result = subprocess.run([
                              './mihomo', 'convert-ruleset', 'classical', 'yaml', str(sanitized_yaml), str(mrs_path)
                          ], capture_output=True, text=True)
                          if result.returncode == 0:
                              print(f'Converted YAML: {path.as_posix()} -> {mrs_path.as_posix()}')
                          else:
                              print(f'Failed YAML: {path.as_posix()}')
                              print((result.stderr or result.stdout or '').strip())
                      finally:
                          if sanitized_yaml != path and sanitized_yaml.exists():
                              sanitized_yaml.unlink()
                  elif suffix == '.txt':
                      tmp_yaml = path.with_suffix('.tmp-convert.yaml')
                      try:
                          subprocess.run(['python3', 'convert_txt_rules.py', str(path), str(tmp_yaml)], check=True)
                          if tmp_yaml.exists() and tmp_yaml.stat().st_size > 0:
                              result = subprocess.run([
                                  './mihomo', 'convert-ruleset', 'classical', 'yaml', str(tmp_yaml), str(mrs_path)
                              ], capture_output=True, text=True)
                              if result.returncode == 0:
                                  print(f'Converted TXT: {path.as_posix()} -> {mrs_path.as_posix()}')
                              else:
                                  print(f'Failed TXT: {path.as_posix()}')
                                  print((result.stderr or result.stdout or '').strip())
                          else:
                              print(f'Skip empty TXT rules: {path.as_posix()}')
                      finally:
                          if tmp_yaml.exists():
                              tmp_yaml.unlink()
                  else:
                      print(f'Skip unsupported file: {path.as_posix()}')
              except subprocess.CalledProcessError as error:
                  print(f'Preparation failed for {path.as_posix()} (suffix: {suffix})')
                  print(error)
          PY

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find rules -name "*.mrs" -print0 | xargs -0 git add
          git add -u rules

          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Sync MRS files for updated rules"
            git push
          fi
