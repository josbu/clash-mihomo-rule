name: Convert YAML to MRS
on:
  push:
    paths:
      - 'rules/**.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        run: |
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-compatible-v1.19.20.gz | gunzip > mihomo
          chmod +x mihomo

      - name: Auto-Heal and Convert
        run: |
          # 注入 Python 智能清洗脚本
          cat << 'EOF' > healer.py
          import sys
          import yaml

          file_path = sys.argv[1]
          try:
              with open(file_path, 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
          except Exception as e:
              print(f"⚠️ YAML 解析跳过 {file_path}: {e}")
              sys.exit(0)

          if not data or 'payload' not in data or not isinstance(data['payload'], list):
              sys.exit(0)

          new_payload = []
          for rule in data['payload']:
              if not isinstance(rule, str):
                  continue
              rule = rule.strip()
              if not rule:
                  continue
              
              # 自动修复旧版 +. 语法
              if rule.startswith('+.'):
                  rule = 'DOMAIN-SUFFIX,' + rule[2:]
              
              # 自动修复没有逗号的孤儿域名 (排除 MATCH)
              if ',' not in rule and rule != 'MATCH':
                  rule = 'DOMAIN,' + rule
                  
              new_payload.append(rule)

          data['payload'] = new_payload
          with open(file_path, 'w', encoding='utf-8') as f:
              yaml.dump(data, f, allow_unicode=True, default_flow_style=False, sort_keys=False)
          EOF

          # 遍历并处理所有 YAML 文件
          find rules/ -name "*.yaml" | while read file; do
            if [ -f "$file" ]; then
              filename="${file%.*}"
              echo "====================================="
              echo "🛡️ 正在智能清洗: $file"
              python3 healer.py "$file"
              
              echo "✅ 清洗完成，喂给内核转换..."
              ./mihomo convert-ruleset classical yaml "$file" "${filename}.mrs"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rules/*.mrs
          # 同时也把你被修复好的 yaml 源码推送到仓库，方便你以后查看
          git add rules/*.yaml 
          
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Auto-heal rules and convert to MRS"
            git push
          fi
