name: Convert rules to MRS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        env:
          MIHOMO_VERSION: v1.18.10
        run: |
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          ./mihomo -v || true

      - name: Validate Mihomo classical conversion
        run: |
          cat <<'EOF' > validate_mihomo_classical.py
          import subprocess
          from pathlib import Path

          sample_yaml = Path('mihomo-classical-smoke.yaml')
          sample_mrs = Path('mihomo-classical-smoke.mrs')
          sample_yaml.write_text('payload:\n  - DOMAIN-SUFFIX,example.com\n', encoding='utf-8')

          try:
              result = subprocess.run(
                  ['./mihomo', 'convert-ruleset', 'classical', 'yaml', str(sample_yaml), str(sample_mrs)],
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0 or not sample_mrs.exists() or sample_mrs.stat().st_size == 0:
                  print('Mihomo classical conversion is unavailable in this release; skipping .mrs generation for this run.')
                  print((result.stderr or result.stdout or '').strip())
                  Path('mihomo_classical_available.txt').write_text('0\n', encoding='utf-8')
              else:
                  Path('mihomo_classical_available.txt').write_text('1\n', encoding='utf-8')
          finally:
              if sample_yaml.exists():
                  sample_yaml.unlink()
              if sample_mrs.exists():
                  sample_mrs.unlink()
          EOF

          python3 validate_mihomo_classical.py

      - name: Collect all rule files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          exts = {'.yaml', '.yml', '.txt'}
          changes = []

          for path in sorted(Path('rules').rglob('*')):
              if path.is_file() and path.suffix.lower() in exts:
                  changes.append({'status': 'A', 'path': path.as_posix()})

          Path('changed_rules.json').write_text(json.dumps(changes, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(changes, ensure_ascii=False, indent=2))
          PY

      - name: Convert all rules
        run: |
          cat <<'EOF' > convert_txt_rules.py
          import sys
          from pathlib import Path

          def normalize_rule(item: str) -> str | None:
              item = item.strip().replace('\xa0', ' ')
              if not item or item.startswith('#'):
                  return None
              if item.startswith('- '):
                  item = item[2:].strip()
              if item.startswith('+.'):
                  item = 'DOMAIN-SUFFIX,' + item[2:]
              elif ',' not in item and item != 'MATCH':
                  item = 'DOMAIN,' + item
              return item or None

          input_path = Path(sys.argv[1])
          output_path = Path(sys.argv[2])
          content = input_path.read_text(encoding='utf-8').replace('\r', '')
          rules = []
          for line in content.split('\n'):
              normalized = normalize_rule(line)
              if normalized:
                  rules.append(normalized)

          if not rules:
              raise SystemExit(0)

          output_path.write_text(
              'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
              encoding='utf-8'
          )
          EOF

          python3 - <<'PY'
          import json
          import subprocess
          import tempfile
          from pathlib import Path

          import yaml

          changes = json.loads(Path('changed_rules.json').read_text(encoding='utf-8'))
          mihomo_classical_available = Path('mihomo_classical_available.txt').read_text(encoding='utf-8').strip() == '1'

          def build_yaml_payload(path: Path, rules: list[str], suffix: str) -> Path:
              tmp_yaml = path.with_suffix(suffix)
              tmp_yaml.write_text(
                  'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
                  encoding='utf-8'
              )
              return tmp_yaml

          def parse_rule(rule: str) -> tuple[str, str, list[str]] | None:
              if not isinstance(rule, str):
                  return None
              parts = [part.strip() for part in rule.split(',')]
              if not parts:
                  return None
              rule_type = parts[0]
              if rule_type == 'MATCH':
                  return 'MATCH', '', []
              if len(parts) < 2 or not parts[1]:
                  return None
              return rule_type, parts[1], parts[2:]

          def normalize_rule(rule: str) -> tuple[str | None, str | None]:
              parsed = parse_rule(rule)
              if parsed is None:
                  return None, 'non-string or malformed rule'

              rule_type, target, options = parsed
              if rule_type == 'MATCH':
                  return 'MATCH', None

              allowed_option_sets = {
                  'DOMAIN': {()},
                  'DOMAIN-SUFFIX': {()},
                  'DOMAIN-KEYWORD': {()},
                  'IP-CIDR': {(), ('no-resolve',)},
                  'IP-CIDR6': {(), ('no-resolve',)},
              }

              if rule_type not in allowed_option_sets:
                  return None, 'unsupported rule type for conservative MRS conversion'

              normalized_options = tuple(option for option in options if option)
              if normalized_options not in allowed_option_sets[rule_type]:
                  return None, 'unsupported rule options for conservative MRS conversion'

              normalized = ','.join([rule_type, target, *normalized_options]) if normalized_options else f'{rule_type},{target}'
              return normalized, None

          def collect_normalized_rules(path: Path, payload: list[object]) -> tuple[list[str], list[tuple[int, str, str]]]:
              normalized_rules: list[str] = []
              skipped_rules: list[tuple[int, str, str]] = []

              for idx, item in enumerate(payload, start=1):
                  display_value = item if isinstance(item, str) else repr(item)
                  normalized_rule, reason = normalize_rule(item) if isinstance(item, str) else (None, 'non-string rule')
                  if normalized_rule is not None:
                      normalized_rules.append(normalized_rule)
                  else:
                      skipped_rules.append((idx, display_value, reason or 'unsupported rule'))

              return normalized_rules, skipped_rules

          def load_normalized_yaml(path: Path) -> tuple[Path | None, list[str], list[tuple[int, str, str]]]:
              data = yaml.safe_load(path.read_text(encoding='utf-8'))
              payload = data.get('payload') if isinstance(data, dict) else None
              if not isinstance(payload, list):
                  raise ValueError(f'Invalid payload in {path.as_posix()}')

              normalized_rules, skipped_rules = collect_normalized_rules(path, payload)

              if skipped_rules:
                  skipped_rules.sort(key=lambda item: item[0])
                  print(f'Skipped {len(skipped_rules)} rules in {path.as_posix()}:')
                  for idx, rule, reason in skipped_rules:
                      print(f'  line #{idx}: {rule} -- {reason}')

              if not normalized_rules:
                  print(f'Skip YAML with no conservative MRS-safe rules: {path.as_posix()}')
                  return None, [], skipped_rules

              return build_yaml_payload(path, normalized_rules, '.sanitized.yaml'), normalized_rules, skipped_rules

          def run_mihomo_convert(source_path: Path, output_path: Path) -> subprocess.CompletedProcess[str]:
              return subprocess.run([
                  './mihomo', 'convert-ruleset', 'classical', 'yaml', str(source_path), str(output_path)
              ], capture_output=True, text=True)

          def remove_invalid_mrs(path: Path) -> None:
              if path.exists() and path.stat().st_size == 0:
                  path.unlink()

          for change in changes:
              path = Path(change['path'])
              mrs_path = path.with_suffix('.mrs')
              status = change['status']
              suffix = path.suffix.lower()

              if status == 'D':
                  if mrs_path.exists():
                      mrs_path.unlink()
                      print(f'Removed: {mrs_path.as_posix()}')
                  continue

              if not path.exists():
                  print(f'Skip missing source: {path.as_posix()}')
                  continue

              if not mihomo_classical_available:
                  remove_invalid_mrs(mrs_path)
                  print(f'Skip MRS conversion because Mihomo classical conversion is unavailable: {path.as_posix()}')
                  continue

              try:
                  if suffix in ('.yaml', '.yml'):
                      sanitized_yaml, normalized_rules, _ = load_normalized_yaml(path)
                      if sanitized_yaml is None:
                          remove_invalid_mrs(mrs_path)
                          continue

                      try:
                          result = run_mihomo_convert(sanitized_yaml, mrs_path)
                          if result.returncode == 0:
                              remove_invalid_mrs(mrs_path)
                              if mrs_path.exists():
                                  print(f'Converted YAML: {path.as_posix()} -> {mrs_path.as_posix()} ({len(normalized_rules)} normalized rules)')
                              else:
                                  print(f'Failed YAML: {path.as_posix()}')
                                  print('Generated empty .mrs file and removed it')
                          else:
                              remove_invalid_mrs(mrs_path)
                              print(f'Failed YAML after conservative normalization: {path.as_posix()}')
                              print((result.stderr or result.stdout or '').strip())
                      finally:
                          if sanitized_yaml.exists():
                              sanitized_yaml.unlink()
                  elif suffix == '.txt':
                      tmp_yaml = path.with_suffix('.tmp-convert.yaml')
                      try:
                          subprocess.run(['python3', 'convert_txt_rules.py', str(path), str(tmp_yaml)], check=True)
                          if tmp_yaml.exists() and tmp_yaml.stat().st_size > 0:
                              sanitized_yaml, normalized_rules, _ = load_normalized_yaml(tmp_yaml)
                              if sanitized_yaml is None:
                                  remove_invalid_mrs(mrs_path)
                                  print(f'Skip TXT with no conservative MRS-safe rules: {path.as_posix()}')
                                  continue
                              try:
                                  result = run_mihomo_convert(sanitized_yaml, mrs_path)
                                  if result.returncode == 0:
                                      remove_invalid_mrs(mrs_path)
                                      if mrs_path.exists():
                                          print(f'Converted TXT: {path.as_posix()} -> {mrs_path.as_posix()} ({len(normalized_rules)} normalized rules)')
                                      else:
                                          print(f'Failed TXT: {path.as_posix()}')
                                          print('Generated empty .mrs file and removed it')
                                  else:
                                      remove_invalid_mrs(mrs_path)
                                      print(f'Failed TXT after conservative normalization: {path.as_posix()}')
                                      print((result.stderr or result.stdout or '').strip())
                              finally:
                                  if sanitized_yaml.exists():
                                      sanitized_yaml.unlink()
                          else:
                              print(f'Skip empty TXT rules: {path.as_posix()}')
                      finally:
                          if tmp_yaml.exists():
                              tmp_yaml.unlink()
                  else:
                      print(f'Skip unsupported file: {path.as_posix()}')
              except subprocess.CalledProcessError as error:
                  print(f'Preparation failed for {path.as_posix()} (suffix: {suffix})')
                  print(error)
          PY

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find rules -name "*.mrs" -type f -size 0 -delete
          git add -A rules

          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Sync MRS files for manual rebuild"
            git push
          fi
