name: Convert YAML to MRS
on:
  push:
    paths:
      - 'rules/**.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        run: |
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-compatible-v1.19.20.gz | gunzip > mihomo
          chmod +x mihomo

      - name: Nuclear Rebuild and Convert
        run: |
          # 注入“降维打击”级别的暴力重构脚本
          cat << 'EOF' > nuclear_rebuild.py
          import sys
          import yaml

          file_path = sys.argv[1]
          
          # 1. 暴力干掉所有幽灵空格（NBSP）和 Windows 换行符
          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read().replace('\xa0', ' ').replace('\r', '')
              
          # 2. 尝试解析提取规则
          try:
              data = yaml.safe_load(content)
          except:
              data = content.split('\n')
              
          rules = []
          if isinstance(data, dict) and 'payload' in data:
              items = data['payload']
          elif isinstance(data, list):
              items = data
          else:
              items = content.split('\n')
              
          if not items:
              sys.exit(0)
              
          # 3. 逐行清洗和修复
          for item in items:
              if not item or not isinstance(item, str):
                  continue
              item = item.strip()
              
              # 跳过空行和注释
              if not item or item.startswith('#'):
                  continue
              
              # 剥离多余的列表符
              if item.startswith('- '):
                  item = item[2:].strip()
                  
              # 修复旧语法和漏掉前缀的孤儿域名
              if item.startswith('+.'):
                  item = 'DOMAIN-SUFFIX,' + item[2:]
              elif ',' not in item and item != 'MATCH':
                  item = 'DOMAIN,' + item
                  
              rules.append(item)
              
          # 4. 采用最标准的格式强行覆写原文件 (拒绝任何格式隐患)
          with open(file_path, 'w', encoding='utf-8') as f:
              f.write("payload:\n")
              for r in rules:
                  f.write(f"  - {r}\n")
          EOF

          # 遍历、重构并转换
          find rules/ -name "*.yaml" | while read file; do
            if [ -f "$file" ]; then
              filename="${file%.*}"
              echo "====================================="
              echo "☢️ 正在暴力重构: $file"
              python3 nuclear_rebuild.py "$file"
              
              echo "✅ 重构完成，开始转换 MRS..."
              ./mihomo convert-ruleset classical yaml "$file" "${filename}.mrs"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rules/*.mrs
          git add rules/*.yaml 
          
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Nuclear rebuild YAML format and convert to MRS"
            git push
          fi
