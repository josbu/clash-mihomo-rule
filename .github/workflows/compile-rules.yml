name: Convert rules to MRS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        env:
          MIHOMO_VERSION: v1.18.10
        run: |
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          ./mihomo -v || true

      - name: Collect all rule files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          exts = {'.yaml', '.yml', '.txt'}
          changes = []

          for path in sorted(Path('rules').rglob('*')):
              if path.is_file() and path.suffix.lower() in exts:
                  changes.append({'status': 'A', 'path': path.as_posix()})

          Path('changed_rules.json').write_text(json.dumps(changes, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(changes, ensure_ascii=False, indent=2))
          PY

      - name: Convert all rules
        run: |
          cat <<'EOF' > convert_txt_rules.py
          import sys
          from pathlib import Path

          def normalize_rule(item: str) -> str | None:
              item = item.strip().replace('\xa0', ' ')
              if not item or item.startswith('#'):
                  return None
              if item.startswith('- '):
                  item = item[2:].strip()
              if item.startswith('+.'):
                  item = 'DOMAIN-SUFFIX,' + item[2:]
              elif ',' not in item and item != 'MATCH':
                  item = 'DOMAIN,' + item
              return item or None

          input_path = Path(sys.argv[1])
          output_path = Path(sys.argv[2])
          content = input_path.read_text(encoding='utf-8').replace('\r', '')
          rules = []
          for line in content.split('\n'):
              normalized = normalize_rule(line)
              if normalized:
                  rules.append(normalized)

          if not rules:
              raise SystemExit(0)

          output_path.write_text(
              'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
              encoding='utf-8'
          )
          EOF

          python3 - <<'PY'
          import json
          import subprocess
          import tempfile
          from pathlib import Path

          import yaml

          changes = json.loads(Path('changed_rules.json').read_text(encoding='utf-8'))

          def build_yaml_payload(path: Path, rules: list[str], suffix: str) -> Path:
              tmp_yaml = path.with_suffix(suffix)
              tmp_yaml.write_text(
                  'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
                  encoding='utf-8'
              )
              return tmp_yaml

          def filter_yaml_rules(path: Path) -> tuple[Path | None, list[str], list[tuple[int, str, str]]]:
              data = yaml.safe_load(path.read_text(encoding='utf-8'))
              payload = data.get('payload') if isinstance(data, dict) else None
              if not isinstance(payload, list):
                  raise ValueError(f'Invalid payload in {path.as_posix()}')

              safe_prefixes = {
                  'DOMAIN,',
                  'DOMAIN-SUFFIX,',
                  'DOMAIN-KEYWORD,',
                  'DOMAIN-REGEX,',
                  'IP-CIDR,',
                  'IP-CIDR6,',
                  'IP-ASN,',
                  'SRC-IP-CIDR,',
                  'SRC-IP-ASN,',
                  'GEOIP,',
                  'MATCH',
              }

              valid_rules = []
              skipped_rules = []

              for idx, rule in enumerate(payload, start=1):
                  if not isinstance(rule, str):
                      skipped_rules.append((idx, repr(rule), 'non-string rule'))
                      continue

                  if rule == 'MATCH':
                      valid_rules.append(rule)
                      continue

                  if any(rule.startswith(prefix) for prefix in safe_prefixes if prefix != 'MATCH'):
                      valid_rules.append(rule)
                      continue

                  skipped_rules.append((idx, rule, 'unsupported rule type for MRS conversion'))

              if skipped_rules:
                  skipped_rules.sort(key=lambda item: item[0])
                  print(f'Skipped {len(skipped_rules)} unsupported rules in {path.as_posix()}:')
                  for idx, rule, reason in skipped_rules:
                      print(f'  line #{idx}: {rule} -- {reason}')

              if not valid_rules:
                  print(f'Skip YAML with no supported rules: {path.as_posix()}')
                  return None, [], skipped_rules

              if len(valid_rules) == len(payload):
                  return path, valid_rules, skipped_rules

              return build_yaml_payload(path, valid_rules, '.sanitized.yaml'), valid_rules, skipped_rules

          def run_mihomo_convert(source_path: Path, output_path: Path) -> subprocess.CompletedProcess[str]:
              return subprocess.run([
                  './mihomo', 'convert-ruleset', 'classical', 'yaml', str(source_path), str(output_path)
              ], capture_output=True, text=True)

          def remove_invalid_mrs(path: Path) -> None:
              if path.exists() and path.stat().st_size == 0:
                  path.unlink()

          def can_convert_rules(path: Path, rules: list[str]) -> bool:
              if not rules:
                  return False

              with tempfile.TemporaryDirectory() as tmpdir:
                  tmpdir_path = Path(tmpdir)
                  probe_yaml = tmpdir_path / f'{path.stem}.probe.yaml'
                  probe_yaml.write_text(
                      'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
                      encoding='utf-8'
                  )
                  probe_mrs = tmpdir_path / f'{path.stem}.probe.mrs'
                  result = run_mihomo_convert(probe_yaml, probe_mrs)
                  remove_invalid_mrs(probe_mrs)
                  return result.returncode == 0 and len(rules) == 1

          def collect_safe_rules(path: Path, rules: list[str], batch_size: int = 32) -> list[str]:
              safe_rules: list[str] = []
              excluded_rules: list[str] = []

              def probe_subset(subset: list[str]) -> None:
                  if not subset:
                      return
                  if len(subset) == 1:
                      if can_convert_rules(path, subset):
                          safe_rules.extend(subset)
                      else:
                          excluded_rules.extend(subset)
                      return

                  midpoint = max(1, len(subset) // 2)
                  probe_subset(subset[:midpoint])
                  probe_subset(subset[midpoint:])

              for start in range(0, len(rules), batch_size):
                  probe_subset(rules[start:start + batch_size])

              if excluded_rules:
                  print(f'Excluded {len(excluded_rules)} crashing rules in {path.as_posix()} after probing:')
                  for rule in excluded_rules:
                      print(f'  - {rule}')

              return safe_rules

          for change in changes:
              path = Path(change['path'])
              mrs_path = path.with_suffix('.mrs')
              status = change['status']
              suffix = path.suffix.lower()

              if status == 'D':
                  if mrs_path.exists():
                      mrs_path.unlink()
                      print(f'Removed: {mrs_path.as_posix()}')
                  continue

              if not path.exists():
                  print(f'Skip missing source: {path.as_posix()}')
                  continue

              try:
                  if suffix in ('.yaml', '.yml'):
                      sanitized_yaml, valid_rules, _ = filter_yaml_rules(path)
                      if sanitized_yaml is None:
                          remove_invalid_mrs(mrs_path)
                          continue

                      final_yaml = sanitized_yaml
                      cleanup_yaml = sanitized_yaml != path

                      try:
                          result = run_mihomo_convert(final_yaml, mrs_path)
                          if result.returncode != 0 or not mrs_path.exists() or mrs_path.stat().st_size == 0:
                              remove_invalid_mrs(mrs_path)
                              print(f'Initial sanitized conversion failed for {path.as_posix()}, probing smaller rule sets...')
                              safe_rules = collect_safe_rules(path, valid_rules)
                              if not safe_rules:
                                  print(f'No probe subset converted for {path.as_posix()}, retrying full sanitized YAML as a fallback output.')
                                  result = run_mihomo_convert(final_yaml, mrs_path)
                              else:
                                  if safe_rules != valid_rules:
                                      if cleanup_yaml and final_yaml.exists():
                                          final_yaml.unlink()
                                      final_yaml = build_yaml_payload(path, safe_rules, '.sanitized.yaml')
                                      cleanup_yaml = True

                                  result = run_mihomo_convert(final_yaml, mrs_path)

                          if result.returncode == 0:
                              remove_invalid_mrs(mrs_path)
                              if mrs_path.exists():
                                  print(f'Converted YAML: {path.as_posix()} -> {mrs_path.as_posix()}')
                              else:
                                  print(f'Failed YAML: {path.as_posix()}')
                                  print('Generated empty .mrs file and removed it')
                          else:
                              remove_invalid_mrs(mrs_path)
                              print(f'Failed YAML: {path.as_posix()}')
                              print((result.stderr or result.stdout or '').strip())
                      finally:
                          if cleanup_yaml and final_yaml.exists():
                              final_yaml.unlink()
                  elif suffix == '.txt':
                      tmp_yaml = path.with_suffix('.tmp-convert.yaml')
                      try:
                          subprocess.run(['python3', 'convert_txt_rules.py', str(path), str(tmp_yaml)], check=True)
                          if tmp_yaml.exists() and tmp_yaml.stat().st_size > 0:
                              result = subprocess.run([
                                  './mihomo', 'convert-ruleset', 'classical', 'yaml', str(tmp_yaml), str(mrs_path)
                              ], capture_output=True, text=True)
                              if result.returncode == 0:
                                  print(f'Converted TXT: {path.as_posix()} -> {mrs_path.as_posix()}')
                              else:
                                  print(f'Failed TXT: {path.as_posix()}')
                                  print((result.stderr or result.stdout or '').strip())
                          else:
                              print(f'Skip empty TXT rules: {path.as_posix()}')
                      finally:
                          if tmp_yaml.exists():
                              tmp_yaml.unlink()
                  else:
                      print(f'Skip unsupported file: {path.as_posix()}')
              except subprocess.CalledProcessError as error:
                  print(f'Preparation failed for {path.as_posix()} (suffix: {suffix})')
                  print(error)
          PY

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find rules -name "*.mrs" -type f ! -size 0 -print0 | xargs -0 -r git add
          find rules -name "*.mrs" -type f -size 0 -delete
          git add -u rules

          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Sync MRS files for updated rules"
            git push
          fi
