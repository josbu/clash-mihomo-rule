name: Convert rules to MRS

on:
  push:
    paths:
      - 'rules/**/*.yaml'
      - 'rules/**/*.yml'
      - 'rules/**/*.txt'
      - '.github/workflows/compile-rules.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Download Mihomo
        env:
          MIHOMO_VERSION: v1.19.22
        run: |
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo
          ./mihomo -v || true

      - name: Validate Mihomo conversion modes
        run: |
          cat <<'EOF' > validate_mihomo_modes.py
          import subprocess
          from pathlib import Path

          checks = [
              ('domain', 'DOMAIN-SUFFIX,example.com'),
              ('ipcidr', 'IP-CIDR,1.1.1.1/32'),
          ]

          for mode, sample_rule in checks:
              sample_yaml = Path(f'mihomo-{mode}-smoke.yaml')
              sample_mrs = Path(f'mihomo-{mode}-smoke.mrs')
              availability_file = Path(f'mihomo_{mode}_available.txt')
              sample_yaml.write_text(f'payload:\n  - {sample_rule}\n', encoding='utf-8')

              try:
                  result = subprocess.run(
                      ['./mihomo', 'convert-ruleset', mode, 'yaml', str(sample_yaml), str(sample_mrs)],
                      capture_output=True,
                      text=True,
                  )
                  if result.returncode != 0 or not sample_mrs.exists() or sample_mrs.stat().st_size == 0:
                      print(f'Mihomo {mode} conversion is unavailable in this release; skipping {mode} .mrs generation for this run.')
                      print((result.stderr or result.stdout or '').strip())
                      availability_file.write_text('0\n', encoding='utf-8')
                  else:
                      availability_file.write_text('1\n', encoding='utf-8')
              finally:
                  if sample_yaml.exists():
                      sample_yaml.unlink()
                  if sample_mrs.exists():
                      sample_mrs.unlink()
          EOF

          python3 validate_mihomo_modes.py

      - name: Collect all rule files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          exts = {'.yaml', '.yml', '.txt'}
          ignored_suffixes = ('.sanitized.yaml', '.tmp-convert.yaml')
          changes = []

          for path in sorted(Path('rules').rglob('*')):
              if path.is_file() and path.suffix.lower() in exts and not any(path.as_posix().endswith(suffix) for suffix in ignored_suffixes):
                  changes.append({'status': 'A', 'path': path.as_posix()})

          Path('changed_rules.json').write_text(json.dumps(changes, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(changes, ensure_ascii=False, indent=2))
          PY

      - name: Convert all rules
        run: |
          cat <<'EOF' > convert_txt_rules.py
          import sys
          from pathlib import Path

          def normalize_rule(item: str) -> str | None:
              item = item.strip().replace('\xa0', ' ')
              if not item or item.startswith('#'):
                  return None
              if item.startswith('- '):
                  item = item[2:].strip()
              if item.startswith('+.'):
                  item = 'DOMAIN-SUFFIX,' + item[2:]
              elif ',' not in item and item != 'MATCH':
                  item = 'DOMAIN,' + item
              return item or None

          input_path = Path(sys.argv[1])
          output_path = Path(sys.argv[2])
          content = input_path.read_text(encoding='utf-8').replace('\r', '')
          rules = []
          for line in content.split('\n'):
              normalized = normalize_rule(line)
              if normalized:
                  rules.append(normalized)

          if not rules:
              raise SystemExit(0)

          output_path.write_text(
              'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
              encoding='utf-8'
          )
          EOF

          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          import yaml

          changes = json.loads(Path('changed_rules.json').read_text(encoding='utf-8'))
          mihomo_domain_available = Path('mihomo_domain_available.txt').read_text(encoding='utf-8').strip() == '1'
          mihomo_ipcidr_available = Path('mihomo_ipcidr_available.txt').read_text(encoding='utf-8').strip() == '1'

          DOMAIN_RULE_TYPES = {'DOMAIN', 'DOMAIN-SUFFIX', 'DOMAIN-KEYWORD'}
          IP_RULE_TYPES = {'IP-CIDR', 'IP-CIDR6'}

          def build_yaml_payload(path: Path, rules: list[str], suffix: str) -> Path:
              tmp_yaml = path.with_suffix(suffix)
              tmp_yaml.write_text(
                  'payload:\n' + ''.join(f'  - {rule}\n' for rule in rules),
                  encoding='utf-8'
              )
              return tmp_yaml

          def parse_rule(rule: str) -> tuple[str, str, list[str]] | None:
              if not isinstance(rule, str):
                  return None
              parts = [part.strip() for part in rule.split(',')]
              if not parts:
                  return None
              rule_type = parts[0]
              if rule_type == 'MATCH':
                  return 'MATCH', '', []
              if len(parts) < 2 or not parts[1]:
                  return None
              return rule_type, parts[1], parts[2:]

          def normalize_rule_for_family(rule: str) -> tuple[str | None, str | None, str | None]:
              parsed = parse_rule(rule)
              if parsed is None:
                  return None, None, 'non-string or malformed rule'

              rule_type, target, options = parsed
              normalized_options = tuple(option for option in options if option)

              if rule_type in DOMAIN_RULE_TYPES:
                  if normalized_options:
                      return None, 'domain', 'unsupported rule options for domain MRS conversion'
                  return f'{rule_type},{target}', 'domain', None

              if rule_type in IP_RULE_TYPES:
                  allowed_options = {'no-resolve'}
                  if any(option not in allowed_options for option in normalized_options):
                      return None, 'ipcidr', 'unsupported rule options for ipcidr MRS conversion'
                  return target, 'ipcidr', None

              return None, None, f'unsupported rule type for MRS conversion: {rule_type}'

          def summarize_skipped_rules(skipped_rules: list[tuple[int, str, str]]) -> dict[str, int]:
              summary: dict[str, int] = {}
              for _, _, reason in skipped_rules:
                  summary[reason] = summary.get(reason, 0) + 1
              return dict(sorted(summary.items()))

          def print_skip_summary(path: Path, skipped_rules: list[tuple[int, str, str]]) -> None:
              if not skipped_rules:
                  return
              summary = summarize_skipped_rules(skipped_rules)
              summary_text = '; '.join(f'{reason}: {count}' for reason, count in summary.items())
              print(f'Skipped unsupported rules in {path.as_posix()}: {summary_text}')

          def load_supported_yaml(path: Path) -> tuple[str | None, Path | None, list[str], list[tuple[int, str, str]]]:
              data = yaml.safe_load(path.read_text(encoding='utf-8'))
              payload = data.get('payload') if isinstance(data, dict) else None
              if not isinstance(payload, list):
                  raise ValueError(f'Invalid payload in {path.as_posix()}')

              kept_by_family: dict[str, list[str]] = {'domain': [], 'ipcidr': []}
              skipped_rules: list[tuple[int, str, str]] = []

              for idx, item in enumerate(payload, start=1):
                  display_value = item if isinstance(item, str) else repr(item)
                  normalized_rule, family, reason = normalize_rule_for_family(item) if isinstance(item, str) else (None, None, 'non-string rule')
                  if normalized_rule is not None and family is not None:
                      kept_by_family[family].append(normalized_rule)
                  else:
                      skipped_rules.append((idx, display_value, reason or 'unsupported rule'))

              if kept_by_family['domain'] and kept_by_family['ipcidr']:
                  skipped_rules.extend(
                      (0, rule, 'ipcidr entries skipped during domain MRS conversion')
                      for rule in kept_by_family['ipcidr']
                  )
                  kept_by_family['ipcidr'] = []

              print_skip_summary(path, skipped_rules)

              present_families = [family for family, rules in kept_by_family.items() if rules]
              if not present_families:
                  print(f'Skipped {path.as_posix()}: no supported MRS rules remained after filtering')
                  return None, None, [], skipped_rules

              family = present_families[0]
              normalized_rules = kept_by_family[family]
              print(
                  f'Prepared {path.as_posix()} as {family}: '
                  f'{len(normalized_rules)} supported rule(s) will be converted, '
                  f'{len(skipped_rules)} unsupported rule(s) skipped'
              )
              return family, build_yaml_payload(path, normalized_rules, '.sanitized.yaml'), normalized_rules, skipped_rules

          def run_mihomo_convert(mode: str, source_path: Path, output_path: Path) -> subprocess.CompletedProcess[str]:
              return subprocess.run([
                  './mihomo', 'convert-ruleset', mode, 'yaml', str(source_path), str(output_path)
              ], capture_output=True, text=True)

          def remove_invalid_mrs(path: Path) -> None:
              if path.exists() and path.stat().st_size == 0:
                  path.unlink()

          def is_mode_available(mode: str) -> bool:
              return mihomo_domain_available if mode == 'domain' else mihomo_ipcidr_available

          for change in changes:
              path = Path(change['path'])
              mrs_path = path.with_suffix('.mrs')
              status = change['status']
              suffix = path.suffix.lower()

              if status == 'D':
                  if mrs_path.exists():
                      mrs_path.unlink()
                      print(f'Removed: {mrs_path.as_posix()}')
                  continue

              if not path.exists():
                  print(f'Skip missing source: {path.as_posix()}')
                  continue

              try:
                  if suffix in ('.yaml', '.yml'):
                      mode, sanitized_yaml, normalized_rules, _ = load_supported_yaml(path)
                      if mode is None or mode == 'mixed':
                          remove_invalid_mrs(mrs_path)
                          continue

                      if mode == 'ipcidr':
                          remove_invalid_mrs(mrs_path)
                          print(f'Skip {path.as_posix()}: Mihomo Linux ipcidr conversion is unavailable in CI')
                          continue

                      if not is_mode_available(mode):
                          remove_invalid_mrs(mrs_path)
                          print(f'Skip {path.as_posix()}: Mihomo {mode} conversion is unavailable')
                          continue

                      try:
                          result = run_mihomo_convert(mode, sanitized_yaml, mrs_path)
                          if result.returncode == 0:
                              remove_invalid_mrs(mrs_path)
                              if mrs_path.exists():
                                  print(f'Converted YAML successfully: {path.as_posix()} -> {mrs_path.as_posix()} ({len(normalized_rules)} {mode} rules)')
                              else:
                                  print(f'Failed YAML: {path.as_posix()}')
                                  print('Generated empty .mrs file and removed it')
                          else:
                              remove_invalid_mrs(mrs_path)
                              print(f'Failed YAML conversion after {mode} normalization: {path.as_posix()}')
                              print((result.stderr or result.stdout or '').strip())
                      finally:
                          if sanitized_yaml and sanitized_yaml.exists():
                              sanitized_yaml.unlink()
                  elif suffix == '.txt':
                      tmp_yaml = path.with_suffix('.tmp-convert.yaml')
                      try:
                          subprocess.run(['python3', 'convert_txt_rules.py', str(path), str(tmp_yaml)], check=True)
                          if tmp_yaml.exists() and tmp_yaml.stat().st_size > 0:
                              mode, sanitized_yaml, normalized_rules, _ = load_supported_yaml(tmp_yaml)
                              if mode is None:
                                  remove_invalid_mrs(mrs_path)
                                  print(f'Skipped TXT {path.as_posix()}: no supported MRS rules remained after filtering')
                                  continue
                              if mode == 'mixed':
                                  remove_invalid_mrs(mrs_path)
                                  print(f'Skipped TXT {path.as_posix()}: mixed rule families are not converted to a single .mrs')
                                  continue
                              if mode == 'ipcidr':
                                  remove_invalid_mrs(mrs_path)
                                  print(f'Skip TXT {path.as_posix()}: Mihomo Linux ipcidr conversion is unavailable in CI')
                                  continue
                              if not is_mode_available(mode):
                                  remove_invalid_mrs(mrs_path)
                                  print(f'Skip TXT {path.as_posix()}: Mihomo {mode} conversion is unavailable')
                                  continue
                              try:
                                  result = run_mihomo_convert(mode, sanitized_yaml, mrs_path)
                                  if result.returncode == 0:
                                      remove_invalid_mrs(mrs_path)
                                      if mrs_path.exists():
                                          print(f'Converted TXT: {path.as_posix()} -> {mrs_path.as_posix()} ({len(normalized_rules)} {mode} rules)')
                                      else:
                                          print(f'Failed TXT: {path.as_posix()}')
                                          print('Generated empty .mrs file and removed it')
                                  else:
                                      remove_invalid_mrs(mrs_path)
                                      print(f'Failed TXT after {mode} normalization: {path.as_posix()}')
                                      print((result.stderr or result.stdout or '').strip())
                              finally:
                                  if sanitized_yaml and sanitized_yaml.exists():
                                      sanitized_yaml.unlink()
                          else:
                              print(f'Skip empty TXT rules: {path.as_posix()}')
                      finally:
                          if tmp_yaml.exists():
                              tmp_yaml.unlink()
                  else:
                      print(f'Skip unsupported file: {path.as_posix()}')
              except subprocess.CalledProcessError as error:
                  print(f'Preparation failed for {path.as_posix()} (suffix: {suffix})')
                  print(error)
          PY

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find rules -name "*.mrs" -type f -size 0 -delete
          find rules -name "*.sanitized.yaml" -type f -delete
          find rules -name "*.tmp-convert.yaml" -type f -delete
          git add -A rules

          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Sync MRS files for manual rebuild"
            git push
          fi
