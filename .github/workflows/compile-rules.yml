name: Convert TXT to MRS
on:
  push:
    paths:
      - 'rules/**.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          # 下载并安装内核
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-compatible-v1.19.20.gz | gunzip > mihomo
          chmod +x mihomo

      - name: Convert TXT to MRS
        run: |
          find rules/ -name "*.txt" | while read file; do
            if [ -f "$file" ]; then
              filename="${file%.*}"
              echo "正在清洗并转换: $file -> ${filename}.mrs"
              
              # 【防崩溃神操作：深度清洗 TXT 文件】
              # 1. 移除 Windows 的 \r 回车符
              sed -i 's/\r//g' "$file"
              # 2. 删除所有以 # 开头的注释行
              sed -i '/^#/d' "$file"
              # 3. 删除所有的纯空行
              sed -i '/^[[:space:]]*$/d' "$file"
              
              # 清洗完毕后，安全喂给内核转换
              ./mihomo convert-ruleset classical text "$file" "${filename}.mrs"
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rules/*.mrs
          
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "Auto-clean and convert TXT to MRS"
            git push
          fi
